<!DOCTYPE html>
<html>
<head>
    <title>Virtual Mouse</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        form {
            background-color: #222;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }
        h1 {
            margin-bottom: 30px;
        }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #00bcd4;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px;
        }
        .btn:hover {
            background-color: #0097a7;
        }
        a.btn {
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <form method="post">
        {% csrf_token %}
        <h1>Launch Virtual Mouse</h1>
        <button type="submit" class="btn">Start</button><br>
        <a href="{% url 'UserHome' %}" class="btn">Back to Home</a>
    </form>
</body>
</html>
